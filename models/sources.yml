version: 2

sources:
  - name: google_drive
    database: LOAD
    schema: GOOGLE_DRIVE
    config:
      freshness:
        warn_after: {count: 1, period: day}
        error_after: {count: 5, period: day}
      loaded_at_query: "select max(\"_FIVETRAN_SYNCED\") from {{ source('google_drive', this.name) }}"
    tables:
      - name: hr_joins
      - name: hr_quits
      - name: expenses
      - name: returns

  - name: web_data
    database: LOAD
    schema: WEB_SCHEMA
    config:
      freshness:
        warn_after: {count: 1, period: day}
        error_after: {count: 5, period: day}
      loaded_at_query: "select max(\"_fivetran_synced\") from {{ source('web_data', this.name) }}"
    tables:
      - name: sessions
      - name: page_views
      - name: item_views
      - name: orders