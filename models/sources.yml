version: 2

sources:
  - name: google_drive
    database: LOAD
    schema: GOOGLE_DRIVE
    config:
      freshness:
        warn_after: {count: 1, period: day}
        error_after: {count: 5, period: day}
    tables:
      - name: hr_joins
      - name: hr_quits
      - name: expenses
      - name: returns

  - name: web_data
    database: LOAD
    schema: WEB_SCHEMA
    config:
      freshness:
        warn_after: {count: 1, period: day}
        error_after: {count: 5, period: day}
    tables:
      - name: sessions
      - name: page_views
      - name: item_views
      - name: orders